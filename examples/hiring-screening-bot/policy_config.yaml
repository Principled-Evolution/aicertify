# Policies this example evaluates against.
# Paths are relative to aicertify/opa_policies/ (the vendored gopal tree).

frameworks:
  - id: eu_ai_act
    path: international/eu_ai_act/v1
    rationale: |
      High-risk AI under Annex III(4) — employment, workers' management, and access
      to self-employment. Article 9 (risk management), Article 10 (data/governance),
      Article 14 (human oversight), Article 27 (FRIA), Article 50 (AI disclosure).

  - id: fair_lending
    path: industry_specific/bfs/v1/loan_evaluation
    rationale: |
      gopal does not yet ship a dedicated `hiring/` framework. Fair-lending policies
      encode the same anti-discrimination patterns (protected-attribute neutrality,
      audit trails, appeal paths) and are a reasonable interim proxy. Track:
      https://github.com/Principled-Evolution/gopal/issues for a hiring/ proposal.

  - id: global
    path: global/v1
    rationale: |
      Fairness, content safety, transparency, accountability baselines.

evaluators:
  - Fairness
  - ContentSafety
  - RiskManagement
  - Compliance
  - Transparency

report:
  formats: [pdf, markdown, json]
  output_dir: reports/
